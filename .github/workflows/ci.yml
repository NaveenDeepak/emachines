# ============================================================
# emachines — Continuous Integration
# ============================================================
# Runs on every Pull Request and every push to main.
# All checks must pass before a PR can be merged.
#
# Jobs:
#   1. lint    — black, isort, flake8 (fast, fails early)
#   2. typecheck — mypy
#   3. test    — pytest across Python 3.9, 3.10, 3.11
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR so pushes don't queue up
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------
  # Job 1 — Linting & formatting checks
  # ----------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install linting tools
        run: |
          pip install --upgrade pip
          pip install black==23.7.0 isort==5.12.0 flake8==6.0.0 \
                      flake8-docstrings flake8-bugbear

      - name: Check formatting with black
        run: black --check --line-length 100 emachines/ tests/

      - name: Check import order with isort
        run: isort --check-only --profile black --line-length 100 emachines/ tests/

      - name: Lint with flake8
        run: |
          flake8 emachines/ tests/ \
            --max-line-length 100 \
            --extend-ignore E203,W503

  # ----------------------------------------------------------
  # Job 2 — Type checking
  # ----------------------------------------------------------
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    needs: lint   # only run if linting passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install project and mypy
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mypy==1.4.1

      - name: Run mypy
        run: mypy emachines/ --ignore-missing-imports

  # ----------------------------------------------------------
  # Job 3 — Tests (matrix across supported Python versions)
  # ----------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint   # run in parallel with typecheck, but only after lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install project with dev dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: |
          pytest tests/ \
            --tb=short \
            --cov=emachines \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage report
        if: matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # ----------------------------------------------------------
  # Job 4 — Notebook validation (nbdev export check)
  # ----------------------------------------------------------
  notebooks:
    name: Notebook Export Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install nbdev and project
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install nbdev>=2.3.0 jupyterlab>=4.0.0

      - name: Check that notebooks export cleanly
        run: |
          nbdev-export
          # Fail if nbdev-export produced uncommitted changes
          git diff --exit-code emachines/ || \
            (echo "❌ Notebooks and generated Python files are out of sync." \
                  "Run 'nbdev-export' locally and commit the result." && exit 1)
