# ============================================================
# emachines — Continuous Integration (nbdev-native)
# ============================================================
#
# Jobs:
#   1. export    — nbdev-export; fail if notebooks and .py files diverge
#   2. nbtest    — nbdev-test; run all test cells inside notebooks
#                  Matrix: Python 3.9, 3.10, 3.11
#   3. typecheck — mypy on the generated emachines/ package
#
# There is no separate pytest job: tests live in the notebooks
# alongside the code they test. The tests/ directory has been
# removed; all assertions migrated to notebook test cells.
#
# Linting (black/isort/flake8) is intentionally absent from CI.
# nbdev autogenerates _modidx.py and test_verify.py in its own
# style; running a reformatter as a gate creates permanent conflict.
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------
  # Job 1 — Notebook export check
  # Core nbdev gate: fails if any notebook has not been exported.
  # Always run `nbdev-export` locally before pushing.
  # ----------------------------------------------------------
  export:
    name: Notebook Export Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install nbdev and project
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "nbdev>=3.0.0" "jupyterlab>=4.0.0"

      - name: Export notebooks and check for drift
        run: |
          nbdev-export
          git diff --exit-code emachines/ || {
            echo "❌ Notebooks and generated Python files are out of sync."
            echo "   Run 'nbdev-export' locally and commit the result."
            exit 1
          }

  # ----------------------------------------------------------
  # Job 2 — Notebook tests (matrix across supported Python versions)
  # Runs every test cell in every notebook.
  # pyproject.toml declares python_requires >= 3.9, so all three
  # versions are tested to catch any version-specific regressions.
  # ----------------------------------------------------------
  nbtest:
    name: Notebook Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: export

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install nbdev and project
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "nbdev>=3.0.0" "jupyterlab>=4.0.0"

      - name: Run notebook tests
        run: nbdev-test --do_print --timing

  # ----------------------------------------------------------
  # Job 3 — Type checking
  # mypy reads the generated emachines/ package. It never
  # rewrites files, so there is no conflict with nbdev.
  # ----------------------------------------------------------
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    needs: export

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install project and mypy
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mypy==1.4.1

      - name: Run mypy
        run: mypy emachines/ --ignore-missing-imports
