# Pre-commit hooks for emachines
#
# IMPORTANT — nbdev compatibility note:
# black, isort, and flake8 are NOT used as pre-commit gates.
# nbdev-export regenerates Python files in its own style; running
# a reformatter on those files creates a permanent conflict loop.
#
# Instead, we use nbdev_clean (strips notebook output and metadata)
# to keep notebooks diff-friendly, and rely on CI for correctness checks:
#   - nbdev-export: ensures notebooks and .py files are in sync
#   - nbdev-test:   runs all test cells
#   - mypy:         type checks generated modules
#
# Install hooks:  pre-commit install
# Run manually:   pre-commit run --all-files

repos:
  # nbdev: strip notebook outputs and transient metadata before committing.
  # This keeps notebook diffs readable (no noisy output or execution counts).
  - repo: https://github.com/fastai/nbdev
    rev: 2.3.12
    hooks:
      - id: nbdev_clean

  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        exclude: "nbs/.*\\.ipynb"   # nbdev manages notebook whitespace
      - id: end-of-file-fixer
        exclude: "nbs/.*\\.ipynb"
      - id: check-yaml
      - id: check-json
        exclude: "nbs/.*\\.ipynb"   # notebooks are JSON but nbdev owns their format
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: detect-private-key
